<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineTrack</title>
    <link rel="stylesheet" href="style.css?v=32" />
  </head>

  <body>
    <nav class="menu-bar">
      <div class="logo">
        <img
          src="images/logo_CineTrack.png"
          alt="CineTrack logo"
          class="logo-image"
        />
      </div>
      <div class="menu-actions" id="auth-container">
        <button type="button" class="btn btn-primary" id="sign-up-trigger">S'inscrire</button>
        <button type="button" class="btn-auth-icon" id="sign-in-trigger" aria-label="Se connecter" title="Se connecter">
          <svg class="auth-nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path fill-rule="evenodd" clip-rule="evenodd" d="M20 23L12 23C11.4477 23 11 22.5523 11 22C11 21.4477 11.4477 21 12 21L20 21C20.5523 21 21 20.5523 21 20L21 4C21 3.44771 20.5523 3 20 3L12 3C11.4477 3 11 2.55228 11 2C11 1.44772 11.4477 1 12 1L20 0.999999C21.6569 0.999999 23 2.34315 23 4L23 20C23 21.6569 21.6569 23 20 23Z" fill="currentColor"/><path fill-rule="evenodd" clip-rule="evenodd" d="M18.6881 10.6901C19.3396 11.4418 19.3396 12.5581 18.6881 13.3098L14.5114 18.1291C13.2988 19.5282 11 18.6707 11 16.8193L11 15L5 15C3.89543 15 3 14.1046 3 13L3 11C3 9.89541 3.89543 8.99998 5 8.99998L11 8.99998L11 7.18071C11 5.3293 13.2988 4.47176 14.5114 5.87085L18.6881 10.6901ZM16.6091 12.6549C16.9348 12.279 16.9348 11.7209 16.6091 11.345L13 7.18071L13 9.49998C13 10.3284 12.3284 11 11.5 11L5 11L5 13L11.5 13C12.3284 13 13 13.6716 13 14.5L13 16.8193L16.6091 12.6549Z" fill="currentColor"/></svg>
        </button>
      </div>
    </nav>

    <section id="user-collection" class="user-collection user-collection--collapsed" hidden>
      <div class="user-collection-body">
        <div class="container">
          <div class="user-collection-header">
            <span class="user-collection-title">Ma liste</span>
            <select id="collection-filter" class="user-collection-filter" data-custom-select="6px">
              <option value="towatch">&Agrave; voir</option>
              <option value="watched">Vus</option>
              <option value="liked">J'aime</option>
              <option value="disliked">J'aime pas</option>
            </select>
          </div>
          <div id="collection-strip" class="user-collection-strip">
            <p class="user-collection-empty">Aucun film dans cette liste</p>
          </div>
        </div>
      </div>
      <button type="button" id="collection-toggle" class="user-collection-toggle" aria-label="Afficher/masquer ma liste">
        <svg class="toggle-eye toggle-eye--open" viewBox="0 0 800 479.31" aria-hidden="true"><path d="M519.9,239.6c0,63.55-53.78,115.07-120.11,115.07s-120.11-51.52-120.11-115.07,53.78-115.07,120.11-115.07c66.34,0,120.11,51.52,120.11,115.07ZM400,0c-68.68.3-139.88,17.03-207.27,49.04-50.04,24.75-98.8,59.66-141.13,102.76C30.81,173.8,4.29,205.65,0,239.64c.51,29.44,32.09,65.78,51.6,87.84,39.7,41.4,87.19,75.35,141.13,102.79,62.85,30.5,132.41,48.06,207.27,49.04,68.75-.31,139.93-17.22,207.24-49.04,50.04-24.75,98.83-59.69,141.16-102.79,20.79-22,47.31-53.85,51.6-87.84-.51-29.44-32.09-65.78-51.6-87.84-39.7-41.4-87.22-75.32-141.16-102.76C544.43,18.56,474.69,1.12,400,0ZM399.95,59.5c104.08,0,188.45,80.66,188.45,180.17s-84.37,180.17-188.45,180.17-188.45-80.66-188.45-180.17S295.87,59.5,399.95,59.5h0Z"/></svg>
        <svg class="toggle-eye toggle-eye--closed" viewBox="0 0 800 680.03" aria-hidden="true"><path d="M446.48,122.36c-15.26-1.65-30.77-2.6-46.48-2.83-68.68.3-139.88,17.01-207.28,49.02-50.04,24.75-98.78,59.69-141.11,102.78-20.79,22-47.32,53.85-51.61,87.84.51,29.44,32.1,65.78,51.61,87.84,39.7,41.4,87.17,75.34,141.11,102.78,1.83.89,3.67,1.77,5.52,2.64l-50.05,87.4,68,40.19L583.81,40.01,518.35,0l-71.87,122.36ZM601.71,166.01l-49.95,86.57c22.98,29.85,36.62,66.67,36.62,106.59,0,99.5-84.35,180.18-188.43,180.18-4.5,0-8.86-.49-13.28-.78l-33.06,57.23c15.25,1.63,30.66,2.82,46.39,3.03,68.75-.31,139.91-17.21,207.23-49.02,50.04-24.75,98.83-59.69,141.16-102.78,20.79-22,47.32-53.85,51.61-87.84-.51-29.44-32.1-65.78-51.61-87.84-39.7-41.4-87.22-75.34-141.16-102.78-1.82-.88-3.68-1.68-5.52-2.54h0ZM399.95,179c4.56,0,9.09.18,13.57.49l-38.72,67.04c-54.34,11.02-95.12,57.25-95.12,112.6,0,13.9,2.56,27.21,7.28,39.55,0,.01,0,.04,0,.05l-38.82,67.24c-23.03-29.88-36.62-66.82-36.62-106.79,0-99.5,84.35-180.17,188.43-180.17h0ZM512.6,320.36l-87.26,151.17c54.05-11.22,94.53-57.25,94.53-112.4,0-13.65-2.72-26.63-7.28-38.77h0Z"/></svg>
        Ma Liste
      </button>
    </section>

    <main class="content">
      <div class="sectionDark">
        <form
          class="search-form container"
          action="#"
          method="get"
          autocomplete="off"
        >
          <div class="field-group">
            <input
              type="text"
              id="title"
              name="title"
              placeholder="Titre"
              autocomplete="off"
              autocapitalize="off"
              spellcheck="false"
            />
          </div>

          <div class="field-group">
            <input
              type="text"
              id="year"
              name="year"
              placeholder="Année"
              maxlength="4"
              autocomplete="off"
            />
          </div>

          <div class="field-group">
            <select id="type" name="type" data-custom-select="8px">
              <option value="" selected>Toutes catégories</option>
              <option value="movie">Film</option>
              <option value="tv">Série TV</option>
            </select>
          </div>

          <button type="submit" class="btn-search" id="search-button" aria-label="Rechercher">
            <svg class="search-icon-svg" viewBox="0 0 168.12 168.06" aria-hidden="true"><path d="M105.88,130.22c-32.97,19-71.94,8.88-92.29-18.57C-6.75,84.21-4.02,45.66,20.16,20.89,44.09-3.62,82.59-6.96,110.82,12.98c27.16,19.19,39.19,58.53,19.61,92.61,4.6,4.58,9.22,9.19,13.84,13.8,6.33,6.33,12.73,12.59,18.95,19.02,6.03,6.22,6.51,15.73,1.36,22.58-6.49,8.64-18.73,9.53-26.56,1.79-10.41-10.28-20.72-20.68-31.05-31.04-.46-.46-.78-1.08-1.09-1.52ZM69.83,25.34c-24.37-.06-44.56,19.84-44.65,44-.09,25.03,19.6,45.09,44.36,45.17,24.75.08,44.88-19.73,44.94-44.23.06-24.87-19.81-44.87-44.64-44.93Z"/></svg>
          </button>
        </form>
      </div>
      <div class="results container" id="results-container">
        <!-- Movie covers will be dynamically inserted here -->
      </div>
      <div class="results-nav container" id="results-nav"></div>

      <div class="signup-overlay" id="signup-overlay" aria-hidden="true">
        <div
          class="signup-overlay-panel"
          role="dialog"
          aria-modal="true"
          aria-labelledby="signup-overlay-title"
        >
          <div class="signup-overlay-header">
            <h2 id="signup-overlay-title">Créer un compte</h2>
          </div>
          <div id="signup-overlay-content"></div>
        </div>
      </div>
    </main>

    <template id="selection-template">
      <div class="selection-overlay">
        <div class="selection-panel">
          <button type="button" class="selection-close" data-selection="back-button" aria-label="Fermer">

              </span>
              <span class="selection-meta-separator" data-selection-separator="after-dislikes">-</span>
              <div class="selection-stars" data-selection="stars"></div>
            </div>

            <div class="selection-summary">
              <p class="selection-summary-text" data-selection="summary">Aucun résumé disponible.</p>
            </div>

            <p class="selection-connect-text" data-selection="connect-text">Connectez-vous pour noter ce film</p>

              <span class="selection-add-label">Ajouter à ma liste :</span>
              <div class="selection-user-actions">

            </div>

            <div class="selection-rate" data-selection="rate-wrap">
              <span class="selection-rate-label">Ma note :</span>
              <div class="selection-rate-stars" data-selection="rate-stars" aria-label="Rate movie"></div>
              <span class="selection-rate-value" data-selection="rate-value">0/5</span>
            </div>
          </div>
        </div>
      </div>
    </template>

    <script type="module" src="JS/init.js?v=32"></script>
  </body>
</html>
